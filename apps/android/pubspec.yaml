name: trusty_android
description: "Android prototype client for TrustTunnel."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  mobile_scanner: ^7.2.0
  dartssh2: ^2.12.0
  installed_apps: ^2.1.1
  vpn_plugin:
    path: ../../packages/vpn_plugin
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

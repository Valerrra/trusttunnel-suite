{{define "content"}}
<div class="page-header">
  <div>
    <h1>{{if .RuleForm.ID}}Редактирование split-правила{{else}}Новое split-правило{{end}}</h1>
    <p>Маршрутизация трафика по типам `domain`, `cidr`, `geoip`, `geosite` с действиями `direct`, `cascade`, `zapret`.</p>
  </div>
</div>

<section class="panel">
  <form class="form grid" method="post" action="{{if .RuleForm.ID}}/routing/rules/{{.RuleForm.ID}}{{else}}/routing/rules{{end}}">
    <label>
      <span>Имя правила</span>
      <input type="text" name="display_name" value="{{.RuleForm.DisplayName}}" required>
    </label>

    <label>
      <span>Priority</span>
      <input type="number" name="priority" value="{{.RuleForm.Priority}}" min="1" step="1">
    </label>

    <label>
      <span>Match type</span>
      <select name="match_type">
        <option value="domain" {{if eq .RuleForm.MatchType "domain"}}selected{{end}}>domain</option>
        <option value="cidr" {{if eq .RuleForm.MatchType "cidr"}}selected{{end}}>cidr</option>
        <option value="geoip" {{if eq .RuleForm.MatchType "geoip"}}selected{{end}}>geoip</option>
        <option value="geosite" {{if eq .RuleForm.MatchType "geosite"}}selected{{end}}>geosite</option>
      </select>
    </label>

    <label>
      <span>Action</span>
      <select name="action">
        <option value="direct" {{if eq .RuleForm.Action "direct"}}selected{{end}}>direct</option>
        <option value="cascade" {{if eq .RuleForm.Action "cascade"}}selected{{end}}>cascade</option>
        <option value="zapret" {{if eq .RuleForm.Action "zapret"}}selected{{end}}>zapret</option>
      </select>
    </label>

    <label class="full">
      <span>Match value</span>
      <input type="text" name="match_value" value="{{.RuleForm.MatchValue}}" placeholder="discord.com | 91.108.0.0/16 | ru | youtube" required>
    </label>

    <label>
      <span>Cascade target</span>
      <select name="cascade_id">
        <option value="0">—</option>
        {{range .Cascades}}
        <option value="{{.ID}}" {{if eq $.RuleForm.CascadeID .ID}}selected{{end}}>{{.DisplayName}}</option>
        {{end}}
      </select>
    </label>

    <label>
      <span>Zapret profile</span>
      <select name="zapret_profile_id">
        <option value="0">—</option>
        {{range .ZapretProfiles}}
        <option value="{{.ID}}" {{if eq $.RuleForm.ZapretProfileID .ID}}selected{{end}}>{{.DisplayName}}</option>
        {{end}}
      </select>
    </label>

    <label class="checkbox">
      <input type="checkbox" name="enabled" {{if .RuleForm.Enabled}}checked{{end}}>
      <span>Правило включено</span>
    </label>

    <label class="full">
      <span>Notes</span>
      <textarea name="notes" rows="3" placeholder="Например: geosite=discord -> zapret fallback">{{.RuleForm.Notes}}</textarea>
    </label>

    <div class="form-actions full">
      <button class="button" type="submit">{{.RuleForm.SubmitLabel}}</button>
      <a class="button secondary" href="{{.RuleForm.CancelURL}}">Отмена</a>
    </div>
  </form>
</section>
{{end}}

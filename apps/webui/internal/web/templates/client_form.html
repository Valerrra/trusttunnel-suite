{{define "content"}}
<div class="page-header">
  <div>
    <h1>{{if .Form.ID}}Редактирование клиента{{else}}Новый клиент{{end}}</h1>
    <p>Эти поля превращаются в официальный TrustTunnel deep-link формата `tt://`.</p>
  </div>
</div>

<section class="panel">
  <form class="form grid" method="post" action="{{if .Form.ID}}/clients/{{.Form.ID}}{{else}}/clients{{end}}">
    <label>
      <span>Имя профиля</span>
      <input type="text" name="display_name" value="{{.Form.DisplayName}}" required>
    </label>

    <label>
      <span>Hostname</span>
      <input type="text" name="hostname" value="{{.Form.Hostname}}" placeholder="vpn.example.com" required>
    </label>

    <label class="full">
      <span>Addresses</span>
      <textarea name="addresses" rows="3" placeholder="203.0.113.10:443&#10;203.0.113.11:443" required>{{.Form.Addresses}}</textarea>
    </label>

    <label>
      <span>Username</span>
      <input type="text" name="username" value="{{.Form.Username}}" required>
    </label>

    <label>
      <span>Password</span>
      <input type="text" name="password" value="{{.Form.Password}}" required>
    </label>

    <label>
      <span>Custom SNI</span>
      <input type="text" name="custom_sni" value="{{.Form.CustomSNI}}" placeholder="edge.example.com">
    </label>

    <label>
      <span>Client random prefix</span>
      <input type="text" name="client_random_prefix" value="{{.Form.ClientRandomPrefix}}" placeholder="abcd1234/ffff0000">
    </label>

    <label>
      <span>Upstream protocol</span>
      <select name="upstream_protocol">
        <option value="http2" {{if eq .Form.UpstreamProtocol "http2"}}selected{{end}}>http2</option>
        <option value="http3" {{if eq .Form.UpstreamProtocol "http3"}}selected{{end}}>http3</option>
      </select>
    </label>

    <label class="checkbox">
      <input type="checkbox" name="has_ipv6" {{if .Form.HasIPv6}}checked{{end}}>
      <span>IPv6 доступен</span>
    </label>

    <label class="checkbox">
      <input type="checkbox" name="skip_verification" {{if .Form.SkipVerification}}checked{{end}}>
      <span>Skip certificate verification</span>
    </label>

    <label class="checkbox">
      <input type="checkbox" name="anti_dpi" {{if .Form.AntiDPI}}checked{{end}}>
      <span>Anti DPI</span>
    </label>

    <label class="full">
      <span>Certificate PEM</span>
      <textarea name="certificate_pem" rows="7" placeholder="-----BEGIN CERTIFICATE-----">{{.Form.CertificatePEM}}</textarea>
    </label>

    <div class="form-actions full">
      <button class="button" type="submit">{{.Form.SubmitLabel}}</button>
      <a class="button secondary" href="{{.Form.CancelURL}}">Отмена</a>
    </div>
  </form>
</section>
{{end}}
